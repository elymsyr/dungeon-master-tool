# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Generated files — freezed/drift/riverpod/json_serializable output.
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/gen/**"
    - "lib/l10n/gen/**"
  errors:
    # Promote a few opinionated lints from info → warning so CI catches them.
    use_build_context_synchronously: warning
    cancel_subscriptions: warning
    close_sinks: warning

linter:
  rules:
    # Safety-focused lints layered on top of flutter_lints defaults.
    # (prefer_const_* and unawaited_futures intentionally omitted — both
    # produce high-noise, low-signal diffs in the current codebase;
    # revisit once we adopt them incrementally.)
    - avoid_empty_else
    - cancel_subscriptions
    - close_sinks
    - use_build_context_synchronously
