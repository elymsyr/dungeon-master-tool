name: dungeon_master_tool
description: "D&D Dungeon Master Tool — Schema-driven campaign management for tabletop RPGs."
publish_to: 'none'
version: 5.1.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage
  msgpack_dart: ^1.0.1
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Database (Drift — Supabase PostgreSQL mirror)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.0

  # Routing
  go_router: ^14.8.1

  # UI
  cupertino_icons: ^1.0.8
  window_manager: ^0.4.3
  desktop_multi_window: ^0.2.1
  screen_retriever: ^0.2.0

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.5
  intl: any
  logger: ^2.5.0
  url_launcher: ^6.3.1
  collection: ^1.19.1
  file_picker: ^10.3.10
  flutter_markdown: ^0.7.7+1
  pdfrx: ^2.2.24

  # Audio (SoLoud — lightweight game audio engine, gapless loops)
  flutter_soloud: ^3.1.0

  # YAML parsing (soundpad theme configs)
  yaml: ^3.1.2

  # Auth (Supabase — online features)
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4
  drift_dev: ^2.22.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/app_icon_transparent.png
    - assets/profanity/
    - assets/packages/srd_core.dnd5e-pkg.json

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/app_icon.png"
  linux:
    generate: true
    image_path: "assets/app_icon.png"
